x-production-backend-environment: &production-backend-environment
  APP_ENV: production
  AUTH_REQUIRED: "true"
  AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET}
  AUTH_USERS_JSON: ${AUTH_USERS_JSON:?set AUTH_USERS_JSON}
  LLM_HEALTHCHECK_ENABLED: "true"
  RAG_ALLOW_LEGACY_DOCUMENTS: "false"
  MILVUS_TOKEN: ${MILVUS_TOKEN:?set MILVUS_TOKEN}
  METRICS_BEARER_TOKEN: ${METRICS_BEARER_TOKEN:?set METRICS_BEARER_TOKEN}
  CORS_ORIGINS_JSON: ${CORS_ORIGINS_JSON:?set CORS_ORIGINS_JSON}
  DOCS_ENABLED: "false"
  ENABLE_POSTGRES_PERSISTENCE: "true"
  REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}

services:
  redis:
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD}

  postgres:
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}

  minio:
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}

  milvus:
    environment:
      COMMON_SECURITY_AUTHORIZATIONENABLED: "true"

  milvus-auth-init:
    profiles: ["app"]
    environment:
      MILVUS_TOKEN: ${MILVUS_TOKEN:?set MILVUS_TOKEN as root:<strong-password>}
      MILVUS_BOOTSTRAP_TOKEN: ${MILVUS_BOOTSTRAP_TOKEN:?set MILVUS_BOOTSTRAP_TOKEN for first-time rotation}

  migrate:
    environment:
      <<: *production-backend-environment
      POSTGRES_DSN: ${MIGRATION_POSTGRES_DSN:?set a DDL-capable MIGRATION_POSTGRES_DSN}

  backend:
    environment:
      <<: *production-backend-environment
      POSTGRES_DSN: ${PRODUCTION_POSTGRES_DSN:?set a CRUD-only PRODUCTION_POSTGRES_DSN}
    read_only: true
    cap_drop: ["ALL"]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=64m,mode=1777
    depends_on:
      milvus-auth-init:
        condition: service_completed_successfully
